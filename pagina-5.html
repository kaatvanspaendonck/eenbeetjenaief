   <script>
/* =========================
   TYPEWRITER ENGINE
========================= */

function typeText(elementId, texts, speed = 50, delay = 500, callback) {
  let line = 0;
  let char = 0;
  const el = document.getElementById(elementId);

  if (!el) return;

  function type() {
    if (line < texts.length) {
      if (char < texts[line].length) {
        el.innerHTML += texts[line].charAt(char);
        char++;
        setTimeout(type, speed);
      } else {
        el.innerHTML += "<br>";
        line++;
        char = 0;
        setTimeout(type, delay);
      }
    } else if (callback) {
      callback();
    }
  }

  type();
}

/* =========================
   INTERLEAVED SCHEDULER 
========================= */

function runSteps(steps) {
  let i = 0;

  function next() {
    if (i >= steps.length) return;

    const step = steps[i];
    i++;

    typeText(step.id, [step.text], 50, 300, next);
  }

  next();
}

/* =========================
   START
========================= */

window.addEventListener("DOMContentLoaded", function () {

  const steps = [
    { id: "typing_1", text: "Het is wel heel interessant. Ik weet niet of er één antwoord is waar ik het echt mee eens ben.." },
    { id: "typing_2", text: "Op welke vraag dan?" },
    { id: "typing_1", text: "Op, is het de verantwoordelijkheid van het individu om zich hier tegen te verzetten?" },
    { id: "typing_1", text: "Ik weet het echt niet." }
  ];

  const video = document.getElementById("bgVideo");

  video.addEventListener("ended", () => {
    video.style.display = "none";
    runSteps(steps);
  });

});

</script>
