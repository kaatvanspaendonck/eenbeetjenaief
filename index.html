<script>

/* =========================
   TYPEWRITER ENGINE
========================= */

function typeText(elementId, texts, speed = 50, delay = 500, callback) {
  let line = 0;
  let char = 0;
  const el = document.getElementById(elementId);

  if (!el) return;

  function type() {
    if (line < texts.length) {
      if (char < texts[line].length) {
        el.innerHTML += texts[line].charAt(char);
        char++;
        setTimeout(type, speed);
      } else {
        el.innerHTML += "<br>";
        line++;
        char = 0;
        setTimeout(type, delay);
      }
    } else if (callback) {
      callback();
    }
  }

  type();
}

/* =========================
   INTERLEAVED SCHEDULER
========================= */

function runSteps(steps) {
  let i = 0;

  function next() {
    if (i >= steps.length) return;

    const step = steps[i];
    i++;

    typeText(step.id, [step.text], 50, 300, next);
  }

  next();
}

/* =========================
   START
========================= */

window.addEventListener("DOMContentLoaded", function () {

  const steps = [
    { id: "typing_1", text: "Ik denk dat we elkaar heel weinig grace geven inderdaad..." },

    { id: "typing_2", text: "Ja! En over wat achter aan het zoeken. Je kan ook chillen, een ander de voordeel van de twijfel gunnen." },
    { id: "typing_1", text: "Dat voordeel van de twijfel, dat gaf ik heel weinig mensen. Voor een lange tijd. En de laatste tijd probeer ik dat iets meer te geven-- een beetje onschuldig tot het tegendeel bewezen is." },

    { id: "typing_1", text: "Ja." },
    { id: "typing_1", text: "Zoveel zelf-censuur heb ik." }
  ];

  runSteps(steps);

});

(function () {
  const popup = document.getElementById("mobile-popup");
  const closeBtn = document.getElementById("close-popup");

  // desktop: niks doen
  const isMobile = window.matchMedia("(max-width: 768px)").matches;

  // al gesloten?
  const dismissed = localStorage.getItem("mobilePopupDismissed");

  if (isMobile && !dismissed) {
    popup.classList.remove("hidden");
  }

  closeBtn.addEventListener("click", function () {
    popup.classList.add("hidden");
    localStorage.setItem("mobilePopupDismissed", "true");
  });
})();

</script>
