<script>

/* =========================
   TYPEWRITER ENGINE
========================= */

function typeText(elementId, texts, speed = 50, delay = 500, callback) {
  let line = 0;
  let char = 0;
  const el = document.getElementById(elementId);

  if (!el) return;

  function type() {
    if (line < texts.length) {
      if (char < texts[line].length) {
        el.innerHTML += texts[line].charAt(char);
        char++;
        setTimeout(type, speed);
      } else {
        el.innerHTML += "<br>";
        line++;
        char = 0;
        setTimeout(type, delay);
      }
    } else if (callback) {
      callback();
    }
  }

  type();
}

/* =========================
   INTERLEAVED SCHEDULER
========================= */

function runSteps(steps) {
  let i = 0;

  function next() {
    if (i >= steps.length) return;

    const step = steps[i];
    i++;

    typeText(step.id, [step.text], 50, 300, next);
  }

  next();
}

/* =========================
   START
========================= */

window.addEventListener("DOMContentLoaded", function () {

  const steps = [
    { id: "typing_1", text: "Ik kan me wel herinneren dat ik een naakt vrouwenlichaam héél lelijk vond. En een vrouwenlichaam in ondergoed héél mooi. Daar was ik gewoon aan gewend. " },
    { id: "typing_2", text: "In sloggi’s?" },
    { id: "typing_1", text: "Nee, tuurlijk niet. In mooi ondergoed. Een push-up bh. Kant. Ik vond de vorm van een natuurlijke borst vies. Dat je dan ook die tepel ziet. Ik had daar echt een soort afkeer van, van dat dierlijke." },
    { id: "typing_2", text: "Omdat het dan een borstvoeding-borst is?" },
    { id: "typing_1", text: "Meer dat ik een blote borst ook gek vond om te zien. Ondergoedmodellen zie je de hele dag, in het bushokje bijvoorbeeld. Ik zat niet op een teamsport waar je met elkaar doucht." },
    { id: "typing_2", text: "Dat vind ik het allerleukste aan de sportschool: de kleedkamer, waar iedereen doucht, naar de sauna gaat. Heel gezellig, iedereen samen bloot. Je aan- en uitkleden is ook veel intiemer dan naakt zijn." }
  ];

  const video = document.getElementById("bgVideo");

  video.addEventListener("ended", () => {
    video.style.display = "none";
    runSteps(steps);
  });

});

</script>
