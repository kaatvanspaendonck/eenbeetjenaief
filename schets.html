 </style>

 </head>

<body>

<div class="menu">

  <a href="info.html"> menu > </a>

</div>

</div>

<div class="achtergrond-afbeelding">
</div>

<div class="tekst_1">
  <p id="typing_1"></p>
</div>

<div class="tekst_2">
  <p id="typing_2"></p>
</div>


   <script>
/* =========================
   TYPEWRITER ENGINE
========================= */

function typeText(elementId, texts, speed = 50, delay = 500, callback) {
  let line = 0;
  let char = 0;
  const el = document.getElementById(elementId);

  if (!el) return;

  function type() {
    if (line < texts.length) {
      if (char < texts[line].length) {
        el.innerHTML += texts[line].charAt(char);
        char++;
        setTimeout(type, speed);
      } else {
        el.innerHTML += "<br>";
        line++;
        char = 0;
        setTimeout(type, delay);
      }
    } else if (callback) {
      callback();
    }
  }

  type();
}

/* =========================
   INTERLEAVED SCHEDULER
========================= */

function runSteps(steps) {
  let i = 0;

  function next() {
    if (i >= steps.length) return;

    const step = steps[i];
    i++;

    typeText(step.id, [step.text], 50, 300, next);
  }

  next();
}

/* =========================
   START
========================= */

window.addEventListener("DOMContentLoaded", function () {

  const steps = [
    { id: "typing_1", text: "..." },
    { id: "typing_2", text: "..." },
    { id: "typing_1", text: "..." },
    { id: "typing_1", text: "..." }
  ];

  runSteps(steps);

});

</script>
