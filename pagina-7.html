   <script>
/* =========================
   TYPEWRITER ENGINE
========================= */

function typeText(elementId, texts, speed = 50, delay = 500, callback) {
  let line = 0;
  let char = 0;
  const el = document.getElementById(elementId);

  if (!el) return;

  function type() {
    if (line < texts.length) {
      if (char < texts[line].length) {
        el.innerHTML += texts[line].charAt(char);
        char++;
        setTimeout(type, speed);
      } else {
        el.innerHTML += "<br>";
        line++;
        char = 0;
        setTimeout(type, delay);
      }
    } else if (callback) {
      callback();
    }
  }

  type();
}

/* =========================
   INTERLEAVED SCHEDULER
========================= */

function runSteps(steps) {
  let i = 0;

  function next() {
    if (i >= steps.length) return;

    const step = steps[i];
    i++;

    typeText(step.id, [step.text], 50, 300, next);
  }

  next();
}

/* =========================

========================= */
